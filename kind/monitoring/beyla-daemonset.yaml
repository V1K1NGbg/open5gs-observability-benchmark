# Grafana Beyla — eBPF auto-instrumenter for Open5GS SBI traces
# Hooks at kernel level into processes listening on port 7777 (SBI) and
# exports OTLP spans to Jaeger. No code changes to Open5GS required.
#
# Requires kernel 5.8+ with BTF (this cluster: 6.17 ✓)
#
# Apply:  kubectl apply -f k8s/monitoring/beyla-daemonset.yaml
# Remove: kubectl delete -f k8s/monitoring/beyla-daemonset.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: beyla
  namespace: open5gs
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: beyla
rules:
- apiGroups: [""]
  resources: ["pods", "services", "nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["replicasets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: beyla
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: beyla
subjects:
- kind: ServiceAccount
  name: beyla
  namespace: open5gs
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: beyla
  namespace: open5gs
  labels:
    app: beyla
spec:
  selector:
    matchLabels:
      app: beyla
  template:
    metadata:
      labels:
        app: beyla
    spec:
      serviceAccountName: beyla
      hostPID: true
      tolerations:
      - operator: Exists
        effect: NoSchedule
      containers:
      - name: beyla
        image: grafana/beyla:3
        env:
        # Watch all processes listening on port 7777 (Open5GS SBI)
        - name: OTEL_EBPF_OPEN_PORT
          value: "7777"
        # Also set old name for backward compat
        - name: BEYLA_OPEN_PORT
          value: "7777"
        # Export traces via OTLP gRPC to Jaeger
        - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
          value: "http://jaeger.monitoring.svc.cluster.local:4317"
        # Export metrics too
        - name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
          value: "http://jaeger.monitoring.svc.cluster.local:4317"
        # Use Kubernetes pod name/namespace as service name
        - name: OTEL_EBPF_KUBE_METADATA_ENABLE
          value: "autodetect"
        - name: BEYLA_KUBE_METADATA_ENABLE
          value: "autodetect"
        # Sample everything (100%)
        - name: OTEL_TRACES_SAMPLER
          value: "always_on"
        # Debug logging to see process discovery
        - name: OTEL_EBPF_LOG_LEVEL
          value: "DEBUG"
        - name: BEYLA_LOG_LEVEL
          value: "DEBUG"
        securityContext:
          privileged: true
          runAsUser: 0
        volumeMounts:
        - name: var-run-beyla
          mountPath: /var/run/beyla
        - name: sys-kernel-debug
          mountPath: /sys/kernel/debug
          readOnly: false
        - name: sys-fs-cgroup
          mountPath: /sys/fs/cgroup
          readOnly: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      volumes:
      - name: var-run-beyla
        emptyDir: {}
      - name: sys-kernel-debug
        hostPath:
          path: /sys/kernel/debug
      - name: sys-fs-cgroup
        hostPath:
          path: /sys/fs/cgroup
